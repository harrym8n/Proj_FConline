 <!-- 결과 표시 영역 -->
 <div class="result" id="result">
    <p>선수: <span id="selectedPlayer"></span></p>
    <p>시즌: <span id="selectedSeason"></span></p>
    <button onclick="goToResultPage()">결과 확인</button>
</div>

<script>
    let playerName = '';
    let selectedSeason = '';

    function updatePlayerName() {
        playerName = document.getElementById('playerName').value;
        updateResult();
    }

    function selectSeason(season) {
        selectedSeason = season;
        updateResult();
    }

    function updateResult() {
        if (playerName && selectedSeason) {
            document.getElementById('selectedPlayer').textContent = playerName;
            document.getElementById('selectedSeason').textContent = selectedSeason;
            document.getElementById('result').style.display = 'block';
        }
    }

    function goToResultPage() {
        // 결과 페이지로 넘어가는 로직 (예시: 결과 페이지 URL로 이동)
        const resultUrl = `result.html?player=${encodeURIComponent(playerName)}&season=${encodeURIComponent(selectedSeason)}`;
        window.location.href = resultUrl; // 결과 페이지로 이동
    }
</script>
</div>
